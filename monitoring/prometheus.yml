global:
  scrape_interval: 15s

scrape_configs:
  - job_name: api-gateway
    static_configs:
      - targets: ["api-gateway:3000"]
  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:3001"]
  - job_name: task-service
    static_configs:
      - targets: ["task-service:8080"]
  - job_name: notification-service
    static_configs:
      - targets: ["notification-service:3003"]
