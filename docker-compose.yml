services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_MULTIPLE_DATABASES: auth_db,task_db,notification_db
    volumes:
      - ./infra/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth-service:
    build: ./auth-service
    environment:
      PORT: 3001
      JWT_SECRET: ${JWT_SECRET:-homework_secret}
      DATABASE_URL: postgres://user:password@postgres:5432/auth_db
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_secret_key}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  notification-service:
    build: ./notification-service
    environment:
      PORT: 3003
      DATABASE_URL: postgres://user:password@postgres:5432/notification_db
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_secret_key}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3003/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  task-service:
    build: ./task-service
    environment:
      PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-homework_secret}
      DATABASE_URL: postgres://user:password@postgres:5432/task_db
      REDIS_URL: redis://redis:6379
      NOTIFICATION_SERVICE_URL: http://notification-service:3003
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_secret_key}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  api-gateway:
    build: ./api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      AUTH_SERVICE_URL: http://auth-service:3001
      TASK_SERVICE_URL: http://task-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:3003
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_secret_key}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    depends_on:
      auth-service:
        condition: service_healthy
      task-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  prometheus:
    image: prom/prometheus:v2.55.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    depends_on:
      api-gateway:
        condition: service_healthy

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "3005:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
